<div class="set-password-page">
  <div class="set-password-card">
    <div class="card-brand">Librería</div>
    <h1>Configurar contraseña</h1>
    <p class="subtitle">Crea la contraseña para tu cuenta de administrador</p>

    <div class="error-box" *ngIf="error && !success">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ error }}
    </div>

    <div class="success-box" *ngIf="success">
      ✅ {{ success }}
      <p class="redirect-msg">Redirigiendo al inicio de sesión...</p>
    </div>

    <form (ngSubmit)="onSubmit()" novalidate *ngIf="token && !success">
      <div class="field">
        <label>Nueva contraseña *</label>
        <div class="input-toggle">
          <input
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="Mínimo 6 caracteres"
            autocomplete="new-password"
          />
          <button type="button" class="toggle-btn" (click)="showPassword = !showPassword">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path *ngIf="!showPassword" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle *ngIf="!showPassword" cx="12" cy="12" r="3"/>
              <path *ngIf="showPassword" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line *ngIf="showPassword" x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="field-error" *ngIf="submitted && password.length < 6">
          Mínimo 6 caracteres.
        </span>
      </div>

      <div class="field">
        <label>Confirmar contraseña *</label>
        <input
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="Repite la contraseña"
          autocomplete="new-password"
        />
        <span class="field-error" *ngIf="submitted && !passwordsMatch">
          Las contraseñas no coinciden.
        </span>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading">
        <span *ngIf="!loading">Activar cuenta</span>
        <span *ngIf="loading">Guardando...</span>
      </button>
    </form>

    <p class="login-link" *ngIf="!token">
      <a routerLink="/login">Ir al inicio de sesión</a>
    </p>
  </div>
</div>

<style>
.set-password-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #f9fafb;
  padding: 24px;
}
.set-password-card {
  background: #fff;
  border-left: 5px solid #000;
  padding: 40px 36px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 4px 24px rgba(0,0,0,.08);
}
.card-brand {
  font-family: Georgia, serif;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: .15em;
  color: #9ca3af;
  margin-bottom: 16px;
}
h1 {
  font-family: Georgia, serif;
  font-size: 24px;
  font-weight: 400;
  color: #111827;
  margin: 0 0 6px;
}
.subtitle {
  font-size: 14px;
  color: #6b7280;
  margin: 0 0 28px;
}
.field {
  margin-bottom: 18px;
}
label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 6px;
}
input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid #d1d5db;
  font-size: 14px;
  outline: none;
  font-family: inherit;
  box-sizing: border-box;
  &:focus { border-color: #000; }
}
.input-toggle {
  display: flex;
  position: relative;
  input { padding-right: 40px; }
}
.toggle-btn {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: #6b7280;
}
.field-error {
  font-size: 12px;
  color: #dc2626;
  margin-top: 4px;
  display: block;
}
.btn-submit {
  width: 100%;
  padding: 12px;
  background: #000;
  color: #fff;
  border: none;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: .06em;
  cursor: pointer;
  margin-top: 8px;
  &:disabled { background: #d1d5db; cursor: not-allowed; }
}
.error-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fef2f2;
  border-left: 3px solid #dc2626;
  padding: 10px 12px;
  font-size: 13px;
  color: #dc2626;
  margin-bottom: 20px;
}
.success-box {
  background: #f0fdf4;
  border-left: 3px solid #16a34a;
  padding: 16px;
  font-size: 14px;
  color: #166534;
  margin-bottom: 16px;
}
.redirect-msg {
  font-size: 12px;
  color: #9ca3af;
  margin: 8px 0 0;
}
.login-link {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  a { color: #000; }
}
</style>
