<app-navbar />

<div class="profile-layout" *ngIf="user">
  <div class="profile-container">

    <div class="profile-hero">
      <div class="profile-avatar">{{ user.username[0].toUpperCase() }}</div>
      <div class="profile-hero-info">
        <h1>{{ user.username }}</h1>
        <span class="role-badge" [class]="'role-' + user.role">
          {{ roleLabel(user.role) }}
        </span>
      </div>
      <div class="hero-actions">
        <a [routerLink]="['/profile/edit']" class="btn-secondary">✏️ Editar perfil</a>
        <a [routerLink]="['/profile/categories']" class="btn-secondary" *ngIf="user.role === 'client'">📚 Categorías</a>
        <button class="btn-secondary" (click)="showPasswordModal = true">🔑 Contraseña</button>
        <button class="btn-danger-soft" (click)="showLogoutModal = true">Cerrar sesión</button>
      </div>
    </div>

    <div class="cards-grid">
      <div class="info-card">
        <h3 class="card-title"><span class="card-icon">👤</span> Cuenta</h3>
        <div class="info-rows">
          <div class="info-row">
            <span class="info-label">Usuario</span>
            <span class="info-value">{{ user.username }}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Correo</span>
            <span class="info-value">{{ user.email }}</span>
          </div>
          <div class="info-row">
            <span class="info-label">Rol</span>
            <span class="info-value">{{ roleLabel(user.role) }}</span>
          </div>
          <div class="info-row">
            <span class="info-label">ID</span>
            <span class="info-value muted">#{{ user.id }}</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<app-confirm-logout
  *ngIf="showLogoutModal"
  (confirmed)="confirmLogout()"
  (cancelled)="showLogoutModal = false"
/>
<app-change-password
  *ngIf="showPasswordModal"
  (closed)="showPasswordModal = false"
/>
